services:
  db:
    image: postgres:17-alpine
    container_name: postgres-dev
    restart: always
    environment:
      # Docker Compose automatically looks for a .env file in the same folder
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: